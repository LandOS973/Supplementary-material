defaults:
  - problem: qubo
  - agent: ppo
  - _self_

# génériques
device: cuda:0
seed: 0
verbose: true
output_dir: outputs
nb_instances_test: 10
nb_restarts: 10
budget: 10000
lambda: 10
typeModel: NeuralNet
isUnivariate: 1
numberHiddenLayersG: 1
nh: 20
knownIG: false
fixSamplingOrder: false
fixUpdateOrder: false
learnOrder: false
dropoutGen: 0.0
dropoutTrain: 0.0
withoutCausalMaskTraining: false
type_strategy: PPO-EDA

hydra:
  run:
    # Use problem.* fields because dim and type_instance are defined under the problem group
    dir: ${output_dir}/${problem.name}/N${problem.dim}/t${problem.type_instance}/${agent.name}/${now:%Y-%m-%d_%H-%M-%S}
