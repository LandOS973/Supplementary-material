defaults:
  - hydra/sweeper: filter
  - problem: qubo
  - agent: ppo
  - _self_

# génériques
device: cuda:0
seed: 0
verbose: true
output_dir: outputs
nb_instances_test: 10
nb_restarts: 10
budget: 10000
lambda: 10
typeModel: NeuralNet
isUnivariate: 1
numberHiddenLayersG: 1
nh: 20
knownIG: false
fixSamplingOrder: false
fixUpdateOrder: false
learnOrder: false
dropoutGen: 0.0
dropoutTrain: 0.0
withoutCausalMaskTraining: false
type_strategy: PPO-EDA  # utilisé par ta fabrique
# problem.dim et problem.type_instance sont définis dans le groupe "problem/*"

hydra:
  sweeper:
    params:
      agent: ppo,reinforce
      agent.learning_rate: 0.01,0.02,0.03
      agent.M: 1
      agent.K_steps: 2,4,6,8
      agent.Beta_adapt: true,false
      agent.beta: 0.5,1.0,2.0
      agent.delta_target: 0.001,0.0025,0.005
      problem.dim: 64,128,256
      problem.type_instance: 0,1,2,3

    filters:
      # 1) Si agent=reinforce ⇒ garder une seule combi (K_steps=2, Beta_adapt=False, delta_target=0.001)
      - hydra_filter_sweeper.Expression:
          expr: "agent == 'reinforce' and (agent['K_steps'] != 2 or agent['Beta_adapt'] != False or agent['delta_target'] != 0.001)"

      # 2) Si Beta_adapt=True ⇒ ne pas balayer beta (on fige beta=1.0)
      - hydra_filter_sweeper.Expression:
          expr: "agent['Beta_adapt'] == True and agent['beta'] != 1.0"

      # 3) Si Beta_adapt=False ⇒ ne pas balayer delta_target (on fige delta_target=0.001)
      - hydra_filter_sweeper.Expression:
          expr: "agent['Beta_adapt'] == False and agent['delta_target'] != 0.001"

