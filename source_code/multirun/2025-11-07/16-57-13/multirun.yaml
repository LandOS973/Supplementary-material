hydra:
  run:
    dir: ${output_dir}/${problem.name}/N${problem.dim}/t${problem.type_instance}/${agent.name}/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params:
      agent: ppo,reinforce
      agent.learning_rate: 0.01,0.02,0.03
      agent.M: '1'
      agent.K_steps: 2,4,6,8
      agent.Beta_adapt: true,false
      agent.beta: 0.5,1.0,2.0
      agent.delta_target: 0.001,0.0025,0.005
      problem.dim: 64,128,256
      problem.type_instance: 0,1,2,3
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - agent=ppo
    - agent.K_steps=2,4
    - problem.dim=256
    - problem.type_instance=0
  job:
    name: main_ppo_eda
    chdir: null
    override_dirname: agent.K_steps=2,4,agent=ppo,problem.dim=256,problem.type_instance=0
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.1'
    cwd: /home/landos/Documents/Supplementary-material/source_code
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/landos/Documents/Supplementary-material/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      agent: ppo
      problem: qubo
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
problem:
  name: QUBO
  type_problem: QUBO
  dim: 256
  type_instance: 0
agent:
  name: PPO-EDA
  updateMethod: PPO
  M: 1
  K_steps: 4
  Beta_adapt: true
  beta: 1.0
  delta_target: 0.0025
  learning_rate: 0.018
device: cuda:0
seed: 0
verbose: true
output_dir: outputs
nb_instances_test: 10
nb_restarts: 10
budget: 10000
lambda: 10
typeModel: NeuralNet
isUnivariate: 1
numberHiddenLayersG: 1
nh: 20
knownIG: false
fixSamplingOrder: false
fixUpdateOrder: false
learnOrder: false
dropoutGen: 0.0
dropoutTrain: 0.0
withoutCausalMaskTraining: false
type_strategy: PPO-EDA
